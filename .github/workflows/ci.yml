name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        resolution: ["highest"]
        include:
          - python-version: "3.10"
            resolution: "lowest-direct"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} --resolution ${{ matrix.resolution }} pytest -m "not slow"
